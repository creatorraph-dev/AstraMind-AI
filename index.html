<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstraMind AI</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- ADSTERRA SOCIAL BAR (inasalia) -->
  <script src="https://pl29303263.profitablecpmratenetwork.com/76/51/c8/7651c8294357f895de1787f6fdbfb76c.js"></script>
</head>

<body class="dark-theme">

<!-- SIDEBAR -->
<div id="historySidebar" class="sidebar">
  <div class="sidebar-header">
    <h2>History</h2>
    <button id="closeSidebar" class="close-btn">&times;</button>
  </div>
  <div id="historyList" class="history-list"></div>
</div>
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!-- HOME -->
<div id="homeScreen" class="home-screen">
  <div class="hero">
    <div class="header-top">
      <button id="historyBtnHome" class="hero-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <h1 class="logo">AstraMind AI</h1>
      <button id="themeToggleHome" class="hero-icon">
        <svg id="themeIconHome" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
      </button>
    </div>
    <div class="hero-content">
      <p class="tagline"></p>
      <p class="subtitle"></p>
    </div>
  </div>

  <div class="card-container">
    <div class="section-title">WHAT DO YOU NEED HELP WITH?</div>
    <div class="category-grid">
      <button class="cat-btn" data-prefix="Math problem: "> ... Math </button>
      <button class="cat-btn" data-prefix="Code help: "> ... Code </button>
      <button class="cat-btn" data-prefix="Science question: "> ... Science </button>
      <button class="cat-btn" data-prefix="Logic puzzle: "> ... Logic </button>
      <button class="cat-btn" data-prefix="Writing help: "> ... Writing </button>
      <button class="cat-btn" data-prefix=""> ... General </button>
    </div>
    <div class="section-title">TRY AN EXAMPLE</div>
    <div class="example-list">
      <div class="example-item" data-query="Solve x² + 5x + 6 = 0">Solve x² + 5x + 6 = 0</div>
      <div class="example-item" data-query="Explain quantum entanglement simply">Explain quantum entanglement simply</div>
      <div class="example-item" data-query="Why is React useEffect running twice?">Why is React useEffect running twice?</div>
    </div>
  </div>

  <div class="input-area">
    <label for="photoUploadHome" class="photo-upload-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    </label>
    <input type="file" id="photoUploadHome" accept="image/*" hidden/>
    <input type="text" id="userInputHome" placeholder="Ask anything..." autocomplete="off"/>
    <button id="sendBtnHome" class="send-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="ad-container" id="adContainer">
    <script>
      atOptions = { 'key' : 'b79c3df3f7af3992c59ae54bf3653614', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
    </script>
    <script src="https://www.highperformanceformat.com/b79c3df3f7af3992c59ae54bf3653614/invoke.js"></script>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="chat-screen">
  <div class="chat-header">
    <button id="backBtnChat" class="clean-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="chat-header-center">
      <span id="chatTitle" class="chat-title">AstraMind AI</span>
    </div>
    <button id="newChatBtnChat" class="clean-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button id="themeToggleChat" class="clean-icon">
      <svg id="themeIconChat" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
    </button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <label for="photoUploadChat" class="photo-upload-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    </label>
    <input type="file" id="photoUploadChat" accept="image/*" hidden/>
    <input type="text" id="userInputChat" placeholder="Message AstraMind..." autocomplete="off"/>
    <button id="sendBtnChat" class="send-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- ====== HAKUNA PUTER.JS HAPA ====== -->
<script src="script.js"></script>
</body>
</html>
